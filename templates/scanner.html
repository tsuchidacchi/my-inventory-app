<select id="camera-selector" class="form-select mb-3">
    <option value="">カメラを選択中...</option>
</select>

<video id="preview" autoplay playsinline></video>

<script>
    const video = document.getElementById('preview');
    const selector = document.getElementById('camera-selector');
    let currentStream = null;

    // 1. 利用可能なカメラ一覧を取得してプルダウンにセット
    async function setupCameraSelector() {
        // 一度ダミーで起動して許可を得ないと、ラベル（カメラ名）が取得できない場合があります
        await navigator.mediaDevices.getUserMedia({ video: true });
        
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');

        selector.innerHTML = ''; // プルダウンをクリア
        videoDevices.forEach((device, index) => {
            const option = document.createElement('option');
            option.value = device.deviceId;
            option.text = device.label || `カメラ ${index + 1}`;
            selector.appendChild(option);
        });

        // 最初のカメラで起動
        if (videoDevices.length > 0) {
            startCamera(videoDevices[0].deviceId);
        }
    }

    // 2. 指定したIDのカメラを起動
    async function startCamera(deviceId) {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop()); // 前のカメラを止める
        }

        const constraints = {
            video: {
                deviceId: { exact: deviceId } // ここでIDを厳密に指定
            }
        };

        try {
            currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = currentStream;
        } catch (err) {
            console.error("カメラの起動に失敗しました:", err);
        }
    }

    // プルダウンが変更されたらカメラを切り替え
    selector.addEventListener('change', (e) => {
        startCamera(e.target.value);
    });

    // 起動時に実行
    setupCameraSelector();
</script>
